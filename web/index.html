<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel Brain — 지식 뷰어</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>🧠 Excel Brain</h1>
    <span id="stats" class="stats">로딩 중…</span>
    <button id="layout" class="hbtn" title="상하/좌우 분할 전환">⬍ 상하</button>
    <button id="help" class="hbtn" title="검색 표현식 사용법">? 사용법</button>
    <input id="q" type="search"
      placeholder="검색어 입력 · 또는 neighbors id --depth 2 / SELECT … (Enter)">
  </header>

  <main>
    <aside class="sidebar"><div id="nsbar" class="nsbar"></div><ul id="list"></ul></aside>

    <section class="center" id="center">
      <section class="panel" id="docPanel">
        <div class="phead"><span class="ptitle">📄 문서</span><span class="hint">Alt+1</span>
          <button class="toggle" title="최소화/펼치기">▾</button></div>
        <article id="doc" class="pbody"></article>
      </section>

      <div class="resizer" data-between="docPanel,graphPanel"></div>

      <section class="panel collapsed" id="graphPanel">
        <div class="phead"><span class="ptitle">🕸 그래프</span><span class="hint">Alt+2</span>
          <button class="toggle" title="최소화/펼치기">▸</button></div>
        <div id="cy" class="pbody"></div>
      </section>

      <div class="resizer" data-between="graphPanel,chatPanel"></div>

      <section class="panel collapsed" id="chatPanel">
        <div class="phead"><span class="ptitle">💬 채팅</span><span class="hint">Alt+3</span>
          <button class="toggle" title="최소화/펼치기">▸</button></div>
        <div class="pbody chatbody">
          <div id="chatlog" class="chatlog"></div>
          <form id="chatform" class="chatform">
            <select id="chatmodel" class="chatmodel" title="AI 모델 (클수록 똑똑하지만 다운로드·메모리↑)">
              <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen2.5 0.5B · 초경량 ~0.5GB</option>
              <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen2.5 1.5B · 가벼움 ~1GB</option>
              <option value="Qwen2.5-3B-Instruct-q4f16_1-MLC" selected>Qwen2.5 3B · 추천 ~2GB</option>
              <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B · ~2.2GB</option>
              <option value="Qwen2.5-7B-Instruct-q4f16_1-MLC">Qwen2.5 7B · 고품질 ~4.7GB</option>
            </select>
            <input id="chatin" type="text" placeholder="자연어 질문 · 또는 ~~ 로 검색창 직접 실행 (예: ~~ neighbors redis --depth 2)">
            <button type="submit">전송</button>
            <button type="button" id="chatclear" class="ghost" title="대화 지우기">지우기</button>
          </form>
        </div>
      </section>
    </section>
  </main>

  <footer><span>전부 <b>클라이언트 사이드</b>(sql.js) — 검색은 텍스트/명령/SQL, 채팅은 자연어→그래프 탐색.</span></footer>

  <!-- 사용법 모달 -->
  <div id="helpModal" class="modal hidden">
    <div class="modalbox">
      <button id="helpClose" class="modalclose">×</button>
      <h2>검색 표현식 사용법</h2>
      <p class="hmsg">검색창에 아래처럼 입력하세요. <b>그냥 단어만 쳐도 검색</b>됩니다. 예시를 클릭하면 검색창에 채워집니다.</p>
      <table id="helpTable"></table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
