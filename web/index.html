<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel Brain — 그래프 뷰어</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>🧠 Excel Brain</h1>
    <span id="stats" class="stats">로딩 중…</span>
    <input id="q" type="search" placeholder="검색 (title/summary/tags/body)… SQLite로 조회">
  </header>
  <main>
    <div id="cy"></div>
    <aside id="panel" class="panel hidden">
      <button id="closePanel" class="close">×</button>
      <div id="panelBody"></div>
    </aside>
  </main>
  <footer>
    <span>전부 <b>클라이언트 사이드</b> — 브라우저가 CSV를 받아 <b>sql.js(SQLite WASM)</b>로 조회하고
    <b>cytoscape.js</b>로 그린다. 서버 없음.</span>
  </footer>

  <!-- CDN: 빌드 없음 -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
